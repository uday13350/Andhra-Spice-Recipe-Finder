<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andhra Spice | CSE Final Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #ffc107;
            --dark: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1546833999-b9f581a1996d?auto=format&fit=crop&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            text-align: center;
            padding: 60px 20px 30px;
            color: white;
        }

        header h1 {
            font-size: 3.5rem;
            color: var(--secondary);
            text-shadow: 2px 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .search-section {
            width: 90%;
            max-width: 600px;
            margin-bottom: 40px;
            display: flex;
            background: white;
            padding: 6px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            border-radius: 50px;
        }

        .search-btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-btn:hover { background: #b71c1c; transform: scale(1.05); }

        /* Recipe Result Card */
        #recipe-container { width: 90%; max-width: 800px; margin-bottom: 60px; }

        .recipe-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            display: none; 
            animation: slideUp 0.5s ease-out;
            border-top: 10px solid var(--primary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .recipe-header h2 { color: var(--primary); font-size: 2rem; }

        .nutrition-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #fff9f9;
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            border: 1px solid #ffecec;
        }

        .stat-box span { display: block; font-size: 1.2rem; font-weight: 700; color: var(--primary); }
        .stat-box label { font-size: 0.7rem; color: #777; text-transform: uppercase; }

        .content-section { margin-bottom: 25px; }
        .content-section h3 { color: var(--dark); margin-bottom: 10px; border-left: 4px solid var(--secondary); padding-left: 10px; }
        
        ul, ol { padding-left: 20px; line-height: 1.7; color: #444; }
        li { margin-bottom: 6px; }

        .btn-pdf {
            width: 100%;
            padding: 15px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-pdf:hover { background: #000; }

        #loading { color: var(--secondary); display: none; margin-bottom: 15px; }
        .error-msg { background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Andhra Spice</h1>
        <p>CSE Diploma Final Year Project</p>
    </header>

    <div class="search-section">
        <input type="text" id="recipeSearch" placeholder="Enter dish name (e.g. Pulihora)...">
        <button class="search-btn" onclick="fetchRecipe()">Search</button>
    </div>

    <div id="loading">Connecting to GitHub Backend...</div>
    <div id="error-box" class="error-msg">Recipe not found. Try Pulihora, Gutti Vankaya, or Prawns Iguru.</div>

    <div id="recipe-container">
        <div class="recipe-card" id="mainCard">
            <div id="pdf-content">
                <div class="recipe-header">
                    <h2 id="title">Dish Name</h2>
                    <span id="type" style="color: #666; font-style: italic;">Veg</span>
                </div>

                <div class="nutrition-panel">
                    <div class="stat-box"><span id="cal">0</span><label>Calories</label></div>
                    <div class="stat-box"><span id="pro">0g</span><label>Protein</label></div>
                    <div class="stat-box"><span id="fat">0g</span><label>Fat</label></div>
                    <div class="stat-box"><span id="carb">0g</span><label>Carbs</label></div>
                </div>

                <div class="content-section">
                    <h3>Ingredients List</h3>
                    <ul id="ingredientsList"></ul>
                </div>

                <div class="content-section">
                    <h3>Cooking Steps</h3>
                    <ol id="instructionsList"></ol>
                </div>
            </div>

            <button class="btn-pdf" onclick="generatePDF()">Download Full Details (PDF)</button>
        </div>
    </div>

    <script>
        async function fetchRecipe() {
            const query = document.getElementById('recipeSearch').value.trim().toLowerCase();
            const card = document.getElementById('mainCard');
            const errorBox = document.getElementById('error-box');
            const loader = document.getElementById('loading');

            if (!query) return;

            loader.style.display = 'block';
            card.style.display = 'none';
            errorBox.style.display = 'none';

            // HARDCODED YOUR GITHUB URL FROM SCREENSHOT
            const GITHUB_BACKEND_URL = "https://raw.githubusercontent.com/uday13350/Andhra-Spice-Recipe-Finder/main/db.json";

            try {
                const response = await fetch(GITHUB_BACKEND_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                const dish = data.recipes.find(r => r.name.toLowerCase().includes(query));

                if (dish) {
                    document.getElementById('title').innerText = dish.name;
                    document.getElementById('type').innerText = dish.type;
                    document.getElementById('cal').innerText = dish.calories;
                    document.getElementById('pro').innerText = dish.protein;
                    document.getElementById('fat').innerText = dish.fat;
                    document.getElementById('carb').innerText = dish.carbs;

                    document.getElementById('ingredientsList').innerHTML = dish.ingredients.map(i => `<li>${i}</li>`).join('');
                    
                    // Handles both string and array instructions
                    const inst = dish.instructions;
                    document.getElementById('instructionsList').innerHTML = Array.isArray(inst) 
                        ? inst.map(step => `<li>${step}</li>`).join('')
                        : `<li>${inst}</li>`;

                    loader.style.display = 'none';
                    card.style.display = 'block';
                } else {
                    loader.style.display = 'none';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("API Error: Make sure your db.json is public on GitHub and the URL is correct.");
            }
        }

        function generatePDF() {
            const element = document.getElementById('pdf-content');
            const dishName = document.getElementById('title').innerText;
            const options = {
                margin: 0.5,
                filename: `${dishName}_Andhra_Recipe.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
