<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andhra Spice | CSE Final Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e63946;
            --primary-hover: #d62828;
            --secondary: #f4a261;
            --dark: #1d3557;
            --light: #f1faee;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Upgraded beautiful background with a warm, appetizing overlay */
            background: linear-gradient(to bottom, rgba(29, 53, 87, 0.8), rgba(230, 57, 70, 0.6)), 
                        url('https://images.unsplash.com/photo-1606491956689-2ea866880c84?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            text-align: center;
            padding: 8vh 20px 4vh;
            color: white;
            animation: fadeIn 1s ease-in;
        }

        header h1 {
            font-size: 4rem;
            color: var(--secondary);
            text-shadow: 2px 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .search-section {
            width: 90%;
            max-width: 650px;
            margin-bottom: 40px;
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 25px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            border-radius: 50px;
            background: transparent;
        }

        /* Suggestions Dropdown Styling */
        .suggestions-dropdown {
            position: absolute;
            top: 110%;
            left: 20px;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .suggestions-dropdown li {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
            font-size: 1.05rem;
            color: var(--dark);
        }

        .suggestions-dropdown li:last-child {
            border-bottom: none;
        }

        .suggestions-dropdown li:hover {
            background: #ffecec;
            color: var(--primary);
            font-weight: 500;
        }

        .search-btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }

        .search-btn:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 57, 70, 0.6);
        }

        /* Recipe Result Card - Glassmorphism Effect */
        #recipe-container { 
            width: 90%; 
            max-width: 800px; 
            margin-bottom: 60px; 
        }

        .recipe-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            display: none; 
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .recipe-header h2 { 
            color: var(--primary); 
            font-size: 2.2rem; 
            font-weight: 700;
        }
        
        .recipe-header span {
            background: var(--dark);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .nutrition-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 35px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-box span { display: block; font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .stat-box label { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: 600; }

        .content-section { margin-bottom: 30px; }
        .content-section h3 { 
            color: var(--dark); 
            margin-bottom: 15px; 
            font-size: 1.3rem;
            display: inline-block;
            border-bottom: 3px solid var(--secondary); 
            padding-bottom: 5px;
        }
        
        ul, ol { padding-left: 20px; line-height: 1.8; color: #444; font-size: 1.05rem; }
        li { margin-bottom: 8px; }
        li::marker { color: var(--primary); font-weight: bold; }

        #loading { 
            color: var(--light); 
            display: none; 
            margin-bottom: 20px; 
            font-size: 1.2rem;
            font-weight: 500;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }
        
        .error-msg { 
            background: rgba(255, 235, 238, 0.9); 
            color: #c62828; 
            padding: 15px 20px; 
            border-radius: 12px; 
            display: none; 
            margin-bottom: 20px; 
            font-weight: 500;
            border-left: 5px solid #c62828;
        }

        /* Scrollbar styling for dropdown */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body>

    <header>
        <h1>Andhra Spice</h1>
        <p>CSE Diploma Final Year Project</p>
    </header>

    <div class="search-section">
        <div class="input-wrapper">
            <!-- Autocomplete off prevents browser's default dropdown from interfering -->
            <input type="text" id="recipeSearch" placeholder="Search for a curry, fry, or dal..." autocomplete="off">
            <ul id="suggestionsList" class="suggestions-dropdown"></ul>
        </div>
        <button class="search-btn" onclick="fetchRecipe()">Search</button>
    </div>

    <div id="loading">Connecting to Database...</div>
    <div id="error-box" class="error-msg">Recipe not found. Check the spelling or try a different dish.</div>

    <div id="recipe-container">
        <div class="recipe-card" id="mainCard">
            <div class="recipe-header">
                <h2 id="title">Dish Name</h2>
                <span id="type">Veg</span>
            </div>

            <div class="nutrition-panel">
                <div class="stat-box"><span id="cal">0</span><label>Calories</label></div>
                <div class="stat-box"><span id="pro">0g</span><label>Protein</label></div>
                <div class="stat-box"><span id="fat">0g</span><label>Fat</label></div>
                <div class="stat-box"><span id="carb">0g</span><label>Carbs</label></div>
            </div>

            <div class="content-section">
                <h3>Ingredients</h3>
                <ul id="ingredientsList"></ul>
            </div>

            <div class="content-section">
                <h3>Cooking Instructions</h3>
                <ol id="instructionsList"></ol>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_BACKEND_URL = "https://raw.githubusercontent.com/uday13350/Andhra-Spice-Recipe-Finder/main/db.json";
        let allRecipes = [];

        // 1. Fetch all data on page load so we can provide instant suggestions
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(GITHUB_BACKEND_URL);
                if (response.ok) {
                    const data = await response.json();
                    allRecipes = data.recipes;
                }
            } catch (err) {
                console.error("Failed to load recipes for suggestions:", err);
            }
        });

        // 2. Logic for Autocomplete / Typo Tolerant Suggestions
        const searchInput = document.getElementById('recipeSearch');
        const suggestionsList = document.getElementById('suggestionsList');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            suggestionsList.innerHTML = ''; // Clear previous suggestions
            
            if (query.length === 0) {
                suggestionsList.style.display = 'none';
                return;
            }

            // Fuzzy Match Logic: checks if characters typed exist in the recipe name in the same order
            // Example: typing 'plh' will match 'Pulihora'
            const pattern = query.split('').join('.*'); 
            const regex = new RegExp(pattern, 'i');

            const matches = allRecipes.filter(recipe => regex.test(recipe.name));

            if (matches.length > 0) {
                suggestionsList.style.display = 'block';
                matches.forEach(match => {
                    const li = document.createElement('li');
                    li.textContent = match.name;
                    // When a suggestion is clicked, fill the input and search automatically
                    li.onclick = () => {
                        searchInput.value = match.name;
                        suggestionsList.style.display = 'none';
                        fetchRecipe();
                    };
                    suggestionsList.appendChild(li);
                });
            } else {
                suggestionsList.style.display = 'none';
            }
        });

        // Hide suggestions if user clicks outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsList.contains(e.target)) {
                suggestionsList.style.display = 'none';
            }
        });

        // 3. Display the Selected Recipe
        function fetchRecipe() {
            const query = searchInput.value.trim().toLowerCase();
            const card = document.getElementById('mainCard');
            const errorBox = document.getElementById('error-box');
            const loader = document.getElementById('loading');

            if (!query) return;

            suggestionsList.style.display = 'none'; // Hide dropdown on search
            loader.style.display = 'block';
            card.style.display = 'none';
            errorBox.style.display = 'none';

            // Find best match (exact or close enough based on the fuzzy regex)
            const pattern = query.split('').join('.*'); 
            const regex = new RegExp(pattern, 'i');
            
            // Prefer exact substring match first, fallback to fuzzy match
            let dish = allRecipes.find(r => r.name.toLowerCase().includes(query)) || 
                       allRecipes.find(r => regex.test(r.name));

            setTimeout(() => { // Artificial delay to show off the loader briefly
                if (dish) {
                    document.getElementById('title').innerText = dish.name;
                    document.getElementById('type').innerText = dish.type;
                    
                    // Dynamic coloring for Veg/Non-Veg tag
                    const typeBadge = document.getElementById('type');
                    typeBadge.style.background = dish.type.toLowerCase() === 'veg' ? '#2a9d8f' : '#e63946';

                    document.getElementById('cal').innerText = dish.calories;
                    document.getElementById('pro').innerText = dish.protein;
                    document.getElementById('fat').innerText = dish.fat;
                    document.getElementById('carb').innerText = dish.carbs;

                    document.getElementById('ingredientsList').innerHTML = dish.ingredients.map(i => `<li>${i}</li>`).join('');
                    
                    const inst = dish.instructions;
                    document.getElementById('instructionsList').innerHTML = Array.isArray(inst) 
                        ? inst.map(step => `<li>${step}</li>`).join('')
                        : `<li>${inst}</li>`;

                    loader.style.display = 'none';
                    card.style.display = 'block';
                } else {
                    loader.style.display = 'none';
                    errorBox.style.display = 'block';
                }
            }, 300);
        }

        // Allow pressing "Enter" to search
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fetchRecipe();
            }
        });
    </script>
</body>
</html>
